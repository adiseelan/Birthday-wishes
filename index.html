<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oru Surprise... 🤫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Poppins:wght@300;400;600&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background: radial-gradient(ellipse at 50% 120%, #2b0f3a 0%, #150822 45%, #0a0414 100%);
    font-family:'Poppins', sans-serif;
    color:#f5e9d0;
    touch-action: manipulation;
    user-select:none; -webkit-user-select:none;
  }

  .stage {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 1.2s ease;
    padding:24px;
    text-align:center;
  }
  .stage.active { opacity:1; pointer-events:auto; }

  /* ---------- STAGE 1 : THE DIYA ---------- */
  .hint {
    font-size:15px; letter-spacing:0.5px; color:#d9c7a3;
    margin-bottom:8px; line-height:1.7; font-weight:300;
    animation: fadeUp 2s ease both;
  }
  .hint b { color:#ffd166; font-weight:600; }

  .diya-wrap {
    margin-top:34px;
    cursor:pointer;
    animation: fadeUp 2.4s ease both;
    position:relative;
  }
  .diya {
    width:120px; height:auto;
    display:block;
    filter: drop-shadow(0 0 24px rgba(255,170,60,0.45));
    transition: transform .3s ease;
  }
  .diya-wrap:active .diya { transform:scale(0.94); }
  .flame {
    transform-origin: 50% 90%;
    animation: flicker 1.6s ease-in-out infinite;
  }
  @keyframes flicker {
    0%,100% { transform:scaleY(1) scaleX(1); opacity:1; }
    30% { transform:scaleY(1.12) scaleX(0.92); opacity:.92; }
    60% { transform:scaleY(0.9) scaleX(1.06); opacity:1; }
  }
  .tap-ring {
    position:absolute; left:50%; top:22%;
    width:70px; height:70px; border-radius:50%;
    border:2px solid rgba(255,210,120,0.6);
    transform:translate(-50%,-50%);
    animation: ring 2s ease-out infinite;
    pointer-events:none;
  }
  @keyframes ring {
    0% { transform:translate(-50%,-50%) scale(0.5); opacity:.9; }
    100% { transform:translate(-50%,-50%) scale(1.6); opacity:0; }
  }

  /* floating diyas that rise after tap */
  .float-diya {
    position:absolute; bottom:-80px;
    font-size:34px;
    animation: rise linear forwards;
    pointer-events:none;
    filter: drop-shadow(0 0 12px rgba(255,180,80,.7));
  }
  @keyframes rise {
    0% { transform: translateY(0) rotate(0deg); opacity:0; }
    12% { opacity:1; }
    100% { transform: translateY(-110vh) rotate(14deg); opacity:.85; }
  }

  /* ---------- STAGE 2 : THE CAKE ---------- */
  .stage2-title {
    font-family:'Yatra One', cursive;
    font-size:clamp(22px, 6vw, 34px);
    color:#ffd166;
    margin-bottom:6px;
    text-shadow:0 0 30px rgba(255,190,80,.35);
  }
  .stage2-sub { font-size:14px; color:#cbb890; font-weight:300; margin-bottom:30px; line-height:1.7; }
  .stage2-sub b { color:#ff9de2; font-weight:600; }

  .cake {
    position:relative;
    width:min(300px, 78vw);
  }
  .cake svg { width:100%; height:auto; display:block; }

  .candles {
    position:absolute; top:-8%; left:0; width:100%;
    display:flex; justify-content:space-evenly;
    padding:0 12%;
  }
  .candle {
    position:relative; width:14px; height:64px;
    cursor:pointer;
  }
  .candle .stick {
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:10px; height:44px; border-radius:4px;
    background: repeating-linear-gradient(135deg, #ff8fb8 0 6px, #ffe3f0 6px 12px);
    box-shadow: inset -2px 0 3px rgba(0,0,0,.18);
  }
  .candle .cflame {
    position:absolute; bottom:44px; left:50%;
    width:14px; height:22px;
    transform:translateX(-50%);
    background: radial-gradient(circle at 50% 78%, #fff5c2 0%, #ffc94d 45%, #ff8c1a 75%, transparent 78%);
    border-radius:50% 50% 50% 50% / 62% 62% 38% 38%;
    transform-origin:50% 100%;
    animation: flicker 1.1s ease-in-out infinite;
    filter: drop-shadow(0 0 10px rgba(255,180,60,.85));
    transition: transform .15s linear, opacity .2s;
  }
  .candle .smoke {
    position:absolute; bottom:48px; left:50%;
    width:8px; height:8px; border-radius:50%;
    background:rgba(200,200,210,.55);
    transform:translateX(-50%);
    opacity:0; pointer-events:none;
  }
  .candle.out .cflame { opacity:0; transform:translateX(-50%) scaleY(0.1); animation:none; }
  .candle.out .smoke { animation: smokeUp 1.4s ease-out forwards; }
  @keyframes smokeUp {
    0% { opacity:.8; transform:translate(-50%,0) scale(1); }
    100% { opacity:0; transform:translate(-40%,-46px) scale(2.6); }
  }
  .blow-progress {
    margin-top:26px; font-size:13px; color:#b8a67f; letter-spacing:1px; min-height:20px;
  }

  /* ---------- BLACKOUT ---------- */
  #blackout {
    position:absolute; inset:0; background:#000;
    opacity:0; pointer-events:none;
    transition:opacity .9s ease;
    z-index:40;
  }
  #blackout.on { opacity:1; }

  /* ---------- STAGE 3 : CELEBRATION ---------- */
  #fireCanvas, #petalCanvas {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }
  #petalCanvas { z-index:3; }
  #fireCanvas { z-index:2; }
  .celebrate-content { position:relative; z-index:5; }

  .bday-eyebrow {
    font-size:13px; letter-spacing:5px; color:#ff9de2;
    text-transform:uppercase; margin-bottom:14px;
    animation: fadeUp 1.4s .4s ease both;
  }
  .bday-title {
    font-family:'Yatra One', cursive;
    font-size:clamp(38px, 11vw, 72px);
    line-height:1.15;
    background: linear-gradient(90deg, #ffd166, #ff9933, #ff5e9e, #ffd166);
    background-size:300% 100%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    animation: shimmer 4s linear infinite, popIn 1s .7s cubic-bezier(.2,1.6,.4,1) both;
    text-shadow:none;
  }
  @keyframes shimmer { to { background-position:300% 0; } }
  @keyframes popIn {
    0% { transform:scale(.4); opacity:0; }
    100% { transform:scale(1); opacity:1; }
  }
  .bday-date {
    margin-top:14px; font-size:15px; color:#e8d9b5; font-weight:300;
    animation: fadeUp 1.4s 1.4s ease both;
  }
  .bday-date span { color:#ffd166; font-weight:600; }
  .next-btn {
    margin-top:40px;
    background:linear-gradient(135deg, #ff9933, #ff5e9e);
    color:#fff; border:none; border-radius:40px;
    padding:13px 34px; font-size:15px; font-family:'Poppins',sans-serif; font-weight:600;
    letter-spacing:.5px;
    box-shadow:0 8px 26px rgba(255,110,90,.4);
    cursor:pointer;
    animation: fadeUp 1.4s 2.2s ease both;
    transition:transform .2s;
  }
  .next-btn:active { transform:scale(.95); }

  /* ---------- STAGE 4 : LETTER ---------- */
  .letter-card {
    position:relative; z-index:5;
    width:min(560px, 92vw);
    max-height:78vh;
    overflow-y:auto;
    background:linear-gradient(160deg, #fff9ee, #ffeeda);
    color:#4a3421;
    border-radius:18px;
    padding:34px 26px 30px;
    box-shadow:0 24px 70px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08);
    text-align:left;
  }
  .letter-card::before {
    content:"🪔"; position:absolute; top:14px; right:18px; font-size:22px; opacity:.85;
  }
  .letter-head {
    font-family:'Yatra One', cursive;
    color:#c2571f; font-size:22px; margin-bottom:16px;
  }
  #letterText {
    font-family:'Caveat', cursive;
    font-size:clamp(20px, 5vw, 25px);
    line-height:1.55;
    white-space:pre-wrap;
    min-height:200px;
  }
  .cursor {
    display:inline-block; width:2px; height:1.1em;
    background:#c2571f; vertical-align:-3px;
    animation: blink .8s step-end infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  .replay {
    margin-top:22px; z-index:5; position:relative;
    background:transparent; border:1px solid rgba(255,209,102,.5);
    color:#ffd166; border-radius:30px; padding:9px 24px;
    font-family:'Poppins',sans-serif; font-size:13px; cursor:pointer;
    opacity:0; transition:opacity 1s;
  }
  .replay.show { opacity:1; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to { opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration:.01s !important; animation-iteration-count:1 !important; transition-duration:.01s !important; }
  }
</style>
</head>
<body>

<!-- ================= STAGE 1 : DIYA ================= -->
<div class="stage active" id="stage1">
  <p class="hint">Akka... oru nimisham 🤫<br>Yaarum paakalaya? Seri...<br><b>Indha deepam ah thottu paaru</b></p>
  <div class="diya-wrap" id="diyaTap">
    <div class="tap-ring"></div>
    <svg class="diya" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
      <!-- flame -->
      <g class="flame">
        <ellipse cx="60" cy="38" rx="11" ry="20" fill="#ff8c1a"/>
        <ellipse cx="60" cy="42" rx="7" ry="13" fill="#ffc94d"/>
        <ellipse cx="60" cy="46" rx="3.5" ry="7" fill="#fff5c2"/>
      </g>
      <!-- wick -->
      <rect x="58.5" y="56" width="3" height="8" rx="1.5" fill="#5a3a1a"/>
      <!-- diya bowl -->
      <path d="M18 70 Q60 60 102 70 Q102 100 60 106 Q18 100 18 70 Z" fill="#b3541e"/>
      <path d="M18 70 Q60 60 102 70 Q60 82 18 70 Z" fill="#e07b39"/>
      <ellipse cx="60" cy="112" rx="30" ry="6" fill="#7a3413"/>
    </svg>
  </div>
</div>

<!-- ================= STAGE 2 : CAKE ================= -->
<div class="stage" id="stage2">
  <div class="stage2-title">Ippo un vela 😄</div>
  <p class="stage2-sub">5 candles iruku akka...<br>Ovvonnaiyum <b>konja neram press panni</b> oodhu 🌬️</p>
  <div class="cake">
    <div class="candles" id="candles"></div>
    <svg viewBox="0 0 300 190" xmlns="http://www.w3.org/2000/svg">
      <!-- plate -->
      <ellipse cx="150" cy="178" rx="140" ry="12" fill="#3a1f4d"/>
      <!-- bottom tier -->
      <rect x="45" y="110" width="210" height="62" rx="12" fill="#8e4bbf"/>
      <rect x="45" y="110" width="210" height="20" rx="10" fill="#a866d6"/>
      <!-- top tier -->
      <rect x="80" y="62" width="140" height="52" rx="10" fill="#ff7fb2"/>
      <!-- drips -->
      <path d="M80 74 q10 0 10 12 q0 10 8 10 q8 0 8 -12 q0 -12 10 -12 q10 0 10 14 q0 12 9 12 q9 0 9 -14 q0 -12 10 -12 q10 0 10 12 q0 12 9 12 q9 0 9 -13 q0 -11 9 -11 q9 0 9 10 L220 62 L80 62 Z" fill="#ffd9e8"/>
      <!-- sprinkles -->
      <circle cx="105" cy="140" r="4" fill="#ffd166"/>
      <circle cx="150" cy="152" r="4" fill="#7de3a0"/>
      <circle cx="195" cy="138" r="4" fill="#ffd166"/>
      <circle cx="128" cy="158" r="3.5" fill="#ff9de2"/>
      <circle cx="172" cy="160" r="3.5" fill="#8fd0ff"/>
    </svg>
  </div>
  <div class="blow-progress" id="blowMsg">✨</div>
</div>

<div id="blackout"></div>

<!-- ================= STAGE 3 : CELEBRATION ================= -->
<div class="stage" id="stage3">
  <canvas id="fireCanvas"></canvas>
  <canvas id="petalCanvas"></canvas>
  <div class="celebrate-content">
    <div class="bday-eyebrow">✦ August 16 ✦</div>
    <h1 class="bday-title">Happy Birthday<br>Kalaiyarasi Akka!</h1>
    <p class="bday-date">Indha naal <span>unaku mattum</span> thaan 💛</p>
    <button class="next-btn" id="toLetter">Onnu iruku... paaru 💌</button>
  </div>
</div>

<!-- ================= STAGE 4 : LETTER ================= -->
<div class="stage" id="stage4">
  <div class="letter-card">
    <div class="letter-head">Dear Kalaiyarasi Akka,</div>
    <div id="letterText"></div><span class="cursor" id="cursor"></span>
  </div>
  <button class="replay" id="replayBtn">↻ Innoru murai paakanuma?</button>
</div>

<script>
/* =====================================================
   EDIT PANNANUM NA: keezha iruka letter text ah maathikonga
   ===================================================== */
const LETTER = `Ungala wish panna oru website eh
build pannitten paaru! 😎

Ithu maari birthday wish
life la yaarum panni irukka maataanga...
Because indha maari akka
yaarukum irukka maataanga! 💛

Neenga siricha, veedu full ah
light adichcha maari irukum.
Un anbu, un care, un support —
ellamae enaku periya bhagyam akka.

Indha varusham un ella kanavum
nirchayama nadakkanum.
Happy Birthday once again! 🎂🪔

— Un anbu thambi ❤️`;

const NUM_CANDLES = 5;
const BLOW_HOLD_MS = 900;   // evlo neram press pannanum

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
function showStage(n){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  $('stage'+n).classList.add('active');
}

/* ---------- WebAudio (no mp3 files!) ---------- */
let actx = null;
function audio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq, t0, dur, type='triangle', vol=0.18){
  const ctx = audio();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(vol, ctx.currentTime + t0 + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + dur + 0.05);
}
function chime(){ tone(880,0,.4,'sine',.12); tone(1318,.08,.5,'sine',.09); }
function pop(){ tone(240,0,.12,'square',.08); }
/* Happy Birthday melody - generated in code */
function happyBirthdayTune(){
  const N = {G4:392, A4:440, B4:494, C5:523, D5:587, E5:659, F5:698, G5:784};
  const seq = [
    [N.G4,.28],[N.G4,.22],[N.A4,.5],[N.G4,.5],[N.C5,.5],[N.B4,.9],
    [N.G4,.28],[N.G4,.22],[N.A4,.5],[N.G4,.5],[N.D5,.5],[N.C5,.9],
    [N.G4,.28],[N.G4,.22],[N.G5,.5],[N.E5,.5],[N.C5,.5],[N.B4,.5],[N.A4,.9],
    [N.F5,.28],[N.F5,.22],[N.E5,.5],[N.C5,.5],[N.D5,.5],[N.C5,1.1]
  ];
  let t = 0.3;
  seq.forEach(([f,d])=>{ tone(f,t,d*0.92,'triangle',.16); t += d; });
  return t;
}

/* =========================================================
   STAGE 1 -> tap diya, diyas rise, move to cake
   ========================================================= */
$('diyaTap').addEventListener('click', ()=>{
  chime();
  const s1 = $('stage1');
  for(let i=0;i<14;i++){
    const d = document.createElement('div');
    d.className = 'float-diya';
    d.textContent = Math.random()<.5 ? '🪔' : '✨';
    d.style.left = (5+Math.random()*90)+'%';
    d.style.animationDuration = (3.5+Math.random()*3)+'s';
    d.style.animationDelay = (Math.random()*0.8)+'s';
    d.style.fontSize = (22+Math.random()*22)+'px';
    s1.appendChild(d);
  }
  setTimeout(()=> showStage(2), 2600);
}, { once:true });

/* =========================================================
   STAGE 2 -> press & hold candles to blow
   ========================================================= */
let outCount = 0;
const msgs = ['Super! Innum '+(NUM_CANDLES-1)+' iruku 🌬️','Semma! Continue pannu 😄','Halfway akka! 🔥','Innum konjam thaan! 🥳','...'];
(function buildCandles(){
  const wrap = $('candles');
  for(let i=0;i<NUM_CANDLES;i++){
    const c = document.createElement('div');
    c.className = 'candle';
    c.innerHTML = '<div class="cflame"></div><div class="smoke"></div><div class="stick"></div>';
    let timer = null, held = 0;
    const flame = () => c.querySelector('.cflame');
    const start = e => {
      e.preventDefault();
      if(c.classList.contains('out')) return;
      held = 0;
      timer = setInterval(()=>{
        held += 60;
        const sc = Math.max(0.15, 1 - held/BLOW_HOLD_MS);
        flame().style.transform = `translateX(-50%) scaleY(${sc}) scaleX(${0.8+sc*0.2})`;
        if(held >= BLOW_HOLD_MS){ clearInterval(timer); blowOut(c); }
      }, 60);
    };
    const stop = () => {
      if(timer) clearInterval(timer);
      if(!c.classList.contains('out')) flame().style.transform = 'translateX(-50%)';
    };
    c.addEventListener('touchstart', start, {passive:false});
    c.addEventListener('mousedown', start);
    ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=> c.addEventListener(ev, stop));
    wrap.appendChild(c);
  }
})();
function blowOut(c){
  c.classList.add('out');
  pop();
  outCount++;
  $('blowMsg').textContent = outCount < NUM_CANDLES ? msgs[outCount-1] : 'Ellam off! 🤭 Wait...';
  if(outCount === NUM_CANDLES){
    setTimeout(()=>{
      $('blackout').classList.add('on');
      setTimeout(()=>{
        showStage(3);
        $('blackout').classList.remove('on');
        startCelebration();
      }, 1300);
    }, 900);
  }
}

/* =========================================================
   STAGE 3 -> fireworks + marigold petal rain + tune
   ========================================================= */
const fc = $('fireCanvas'), pc = $('petalCanvas');
const fx = fc.getContext('2d'), px = pc.getContext('2d');
let W, H, rockets = [], sparks = [], petals = [], celebrating = false;
function resize(){
  W = innerWidth; H = innerHeight;
  [fc,pc].forEach(c=>{ c.width = W; c.height = H; });
}
addEventListener('resize', resize); resize();

const FIRE_COLORS = ['#ffd166','#ff9933','#ff5e9e','#8fd0ff','#7de3a0','#ff8fb8'];
function launchRocket(){
  rockets.push({ x: W*(0.15+Math.random()*0.7), y: H, vy: -(H*0.011+Math.random()*H*0.004), color: FIRE_COLORS[(Math.random()*FIRE_COLORS.length)|0], targetY: H*(0.18+Math.random()*0.3) });
}
function explode(r){
  pop();
  const n = 46;
  for(let i=0;i<n;i++){
    const a = (Math.PI*2*i)/n, sp = 2+Math.random()*3.6;
    sparks.push({ x:r.x, y:r.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color:r.color });
  }
}
function spawnPetal(){
  petals.push({
    x: Math.random()*W, y: -20,
    vx: (Math.random()-0.5)*0.7, vy: 0.8+Math.random()*1.4,
    rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.06,
    size: 6+Math.random()*8,
    color: Math.random()<0.6 ? '#ff9933' : (Math.random()<0.5 ? '#ffb347' : '#ffd166'),
    sway: Math.random()*Math.PI*2
  });
}
function drawPetal(p){
  px.save();
  px.translate(p.x, p.y); px.rotate(p.rot);
  px.fillStyle = p.color;
  px.beginPath();
  px.ellipse(0, 0, p.size, p.size*0.55, 0, 0, Math.PI*2);
  px.fill();
  px.fillStyle = 'rgba(180,80,10,0.35)';
  px.beginPath();
  px.ellipse(0, 0, p.size*0.4, p.size*0.2, 0, 0, Math.PI*2);
  px.fill();
  px.restore();
}
function loop(){
  if(!celebrating) return;
  fx.fillStyle = 'rgba(10,4,20,0.22)';
  fx.fillRect(0,0,W,H);
  px.clearRect(0,0,W,H);

  rockets.forEach(r=>{
    r.y += r.vy;
    fx.fillStyle = r.color;
    fx.beginPath(); fx.arc(r.x, r.y, 2.6, 0, Math.PI*2); fx.fill();
  });
  for(let i=rockets.length-1;i>=0;i--){
    if(rockets[i].y <= rockets[i].targetY){ explode(rockets[i]); rockets.splice(i,1); }
  }
  sparks.forEach(s=>{
    s.x += s.vx; s.y += s.vy; s.vy += 0.045; s.vx *= 0.985; s.life -= 0.014;
    fx.globalAlpha = Math.max(s.life, 0);
    fx.fillStyle = s.color;
    fx.beginPath(); fx.arc(s.x, s.y, 2.2, 0, Math.PI*2); fx.fill();
  });
  fx.globalAlpha = 1;
  sparks = sparks.filter(s=>s.life>0);

  petals.forEach(p=>{
    p.sway += 0.03;
    p.x += p.vx + Math.sin(p.sway)*0.6;
    p.y += p.vy; p.rot += p.vr;
    drawPetal(p);
  });
  petals = petals.filter(p=>p.y < H+30);

  requestAnimationFrame(loop);
}
let fireInterval, petalInterval;
function startCelebration(){
  celebrating = true;
  fx.fillStyle = '#0a0414'; fx.fillRect(0,0,W,H);
  loop();
  for(let i=0;i<4;i++) setTimeout(launchRocket, i*280);
  fireInterval = setInterval(launchRocket, 850);
  petalInterval = setInterval(spawnPetal, 130);
  happyBirthdayTune();
}

/* =========================================================
   STAGE 4 -> typewriter letter
   ========================================================= */
$('toLetter').addEventListener('click', ()=>{
  clearInterval(fireInterval);
  clearInterval(petalInterval);
  celebrating = false;
  showStage(4);
  typeLetter();
});
function typeLetter(){
  const el = $('letterText');
  el.textContent = '';
  let i = 0;
  (function tick(){
    if(i < LETTER.length){
      el.textContent += LETTER[i];
      if(LETTER[i] !== ' ' && LETTER[i] !== '\n' && i%3===0) tone(600+Math.random()*120, 0, .04, 'sine', .02);
      i++;
      setTimeout(tick, LETTER[i-1]==='\n' ? 240 : 38);
    } else {
      $('cursor').style.display = 'none';
      $('replayBtn').classList.add('show');
    }
  })();
}
$('replayBtn').addEventListener('click', ()=> location.reload());
</script>
